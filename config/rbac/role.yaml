  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - xrpl.thabelo.dev
  resources:
  - xrplwallets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - xrpl.thabelo.dev
  resources:
  - xrplwallets/finalizers
  verbs:
  - update
- apiGroups:
  - xrpl.thabelo.dev
  resources:
  - xrplwallets/status
  verbs:
  - get
  - patch
  - update
