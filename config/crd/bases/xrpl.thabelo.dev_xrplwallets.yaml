    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          XRPLWallet is the Schema for the xrplwallets API.
          It provisions an XRPL wallet and stores the credentials in a Kubernetes Secret.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of XRPLWallet.
            properties:
              fund:
                default: true
                description: |-
                  Fund controls whether the wallet should be funded from the testnet/devnet faucet.
                  Has no effect on mainnet.
                type: boolean
              fundAmount:
                default: 1000
                description: |-
                  FundAmount is the amount of XRP to request from the faucet (testnet/devnet only).
                  The faucet typically provides ~1000 XRP regardless of this value.
                maximum: 10000
                minimum: 1
                type: integer
              network:
                default: testnet
                description: Network specifies which XRPL network to create the wallet
                  on.
                enum:
                - testnet
                - devnet
                - mainnet
                type: string
              secretLabels:
                additionalProperties:
                  type: string
                description: SecretLabels are extra labels applied to the created
                  Secret so workloads can discover it.
                type: object
              secretName:
                default: xrpl-wallet
                description: |-
                  SecretName is the name of the Kubernetes Secret that will store the wallet credentials.
                  Defaults to the XRPLWallet resource name if not specified.
                maxLength: 253
                minLength: 1
                type: string
            required:
            - network
            type: object
          status:
            description: status defines the observed state of XRPLWallet.
            properties:
              address:
                description: Address is the public XRPL wallet address (safe to display
                  and share).
                type: string
              balance:
                description: Balance is the current XRP balance of the wallet as reported
                  by the ledger.
                type: string
              conditions:
                description: Conditions represent the latest available observations
                  of the XRPLWallet state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
