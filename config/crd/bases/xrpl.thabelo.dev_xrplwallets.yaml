kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: xrplwallets.xrpl.thabelo.dev
spec:
  group: xrpl.thabelo.dev
  names:
    categories:
    - xrpl
    kind: XRPLWallet
    listKind: XRPLWalletList
    plural: xrplwallets
    shortNames:
    - xw
    singular: xrplwallet
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.network
