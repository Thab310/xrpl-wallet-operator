                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              explorerURL:
                description: ExplorerURL is a link to the XRPL explorer page for this
                  wallet address.
                type: string
              lastBalanceCheck:
                description: LastBalanceCheck is the timestamp of the most recent
                  balance query.
                format: date-time
                type: string
              message:
                description: Message is a human-readable description of the current
                  state or last error.
                type: string
              network:
                description: Network is the XRPL network this wallet was created on.
                type: string
              retryCount:
                description: RetryCount tracks consecutive reconciliation failures
                  for back-off logic.
                type: integer
              secretCreated:
                description: SecretCreated indicates whether the Kubernetes Secret
                  holding credentials has been created.
                type: boolean
              secretRef:
                description: SecretRef is the name of the Kubernetes Secret that holds
                  the wallet credentials.
                type: string
              state:
                description: State is the current phase of the wallet lifecycle.
                enum:
                - Pending
                - Creating
                - Funding
                - Ready
                - Error
                - Deleting
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
